name: ✨ 功能请求
description: 提议新功能或改进现有功能
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法！请描述清楚功能背景、使用场景和预期效果。

  - type: input
    id: summary
    attributes:
      label: 功能一句话描述
      description: 用一句话概括这个功能
      placeholder: "例如：支持语音消息回放"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题？
      description: 这个功能要解决什么痛点或需求
      placeholder: "例如：徒步时漏听重要指令后无法回放确认"
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 用户在什么情况下会用到这个功能
      placeholder: |
        场景：山地徒步小队
        用户：队伍后方的队员
        操作：长按某条语音消息，选择「回放」
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你希望这个功能如何工作
      placeholder: "例如：应用本地保存最近 5 分钟语音缓存，用户可点击回放"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      options:
        - P0 - Must have（必须有）
        - P1 - Should have（应该有）
        - P2 - Could have（可以有）
        - 不确定
    validations:
      required: false

  - type: checkboxes
    id: willing
    attributes:
      label: 其他
      options:
        - label: 我愿意参与实现该功能
        - label: 我已搜索现有 Issues，未找到相同请求
          required: true
