name: 🐛 Bug 报告
description: 报告 OffGrid 应用中的缺陷或异常行为
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写以下信息，帮助我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 你使用的 OffGrid 版本或 commit hash
      placeholder: "例如：v0.1.0 或 commit abc1234"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号
      description: 出现问题的手机型号
      placeholder: "例如：Samsung Galaxy S23 / Xiaomi 13 / Pixel 7"
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android 版本
      description: 系统版本号
      placeholder: "例如：Android 14 (API 34)"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何一步步触发这个问题
      placeholder: |
        1. 打开应用
        2. 点击「开始组网」
        3. 另一台手机加入后...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
      placeholder: "例如：两台手机应在 30 秒内完成组网"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
      placeholder: "例如：组网超时，提示「未找到节点」"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 如有 adb logcat 日志或截图，请粘贴于此
      render: shell
    validations:
      required: false

  - type: dropdown
    id: network_size
    attributes:
      label: 组网规模
      description: 出现问题时的节点数量
      options:
        - 2 台
        - 3 台
        - 4 台
        - 5 台及以上
    validations:
      required: false

  - type: checkboxes
    id: audio_device
    attributes:
      label: 音频外设
      options:
        - label: 有线耳机
        - label: 蓝牙耳机
        - label: 手机扬声器/麦克风
        - label: 其他

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已确认该问题在最新版本中仍然存在
          required: true
        - label: 我已搜索现有 Issues，未找到相同问题
          required: true
